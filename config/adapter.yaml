---
endpoints:
  default:
    listeners:
      http:
        listenAddress: "0.0.0.0"
        listenPort: 9090
        ssl: false
        scriptOnly: false
        defaultScript: "Default.groovy"
        defaultBackend: "keycloak"
        secured: false
        secureProvider:
          providerClass: "dev.nishisan.ngate.auth.jwt.JWTTokenDecoder"
          name: "local-keycloak-jwt"
          options:
            issuerUri: http://keycloak:8080/realms/inventory-dev
            jwkSetUri: http://keycloak:8080/realms/inventory-dev/protocol/openid-connect/certs
        urlContexts:
          default:
            context: "/*"
            method: "ANY"
            ruleMapping: "default/Rules.groovy"

      http-noauth:
        listenAddress: "0.0.0.0"
        listenPort: 9091
        ssl: false
        scriptOnly: false
        defaultScript: "Default.groovy"
        defaultBackend: "static-backend"
        secured: false
        urlContexts:
          default:
            context: "/*"
            method: "ANY"
            ruleMapping: "default/Rules.groovy"

    backends:
      keycloak:
        backendName: "keycloak"
        members:
          - url: "http://keycloak:8080"
        oauthClientConfig:
          ssoName: "inventory-keycloak"
          clientId: "ngate-client"
          clientSecret: "ngate-secret"
          userName: "inventory-svc"
          password: "inventory-svc-pass"
          tokenServerUrl: "http://keycloak:8080/realms/inventory-dev/protocol/openid-connect/token"
          useRefreshToken: true
          renewBeforeSecs: 30
          authorizationServerUrl: null
          authScopes:
            - "openid"
            - "profile"
            - "email"

      keycloak-noauth:
        backendName: "keycloak-noauth"
        members:
          - url: "http://keycloak:8080"

      static-backend:
        backendName: "static-backend"
        members:
          - url: "http://static-backend:8080"

    ruleMapping: "default/Rules.groovy"
    ruleMappingThreads: 1
    socketTimeout: 30

    # Jetty Thread Pool
    jettyMinThreads: 16
    jettyMaxThreads: 500
    jettyIdleTimeout: 120000

    # OkHttp Connection Pool
    connectionPoolSize: 256
    connectionPoolKeepAliveMinutes: 5

    # OkHttp Dispatcher
    dispatcherMaxRequests: 512
    dispatcherMaxRequestsPerHost: 256

# --- Cluster Mode (NGrid) ---
# Descomente para habilitar cluster mode (escalabilidade horizontal)
# cluster:
#   enabled: true
#   nodeId: "ngate-1"
#   host: "0.0.0.0"
#   port: 7100
#   clusterName: "ngate-cluster"
#   seeds:
#     - "10.0.0.2:7100"
#     - "10.0.0.3:7100"
#   replicationFactor: 2
#   dataDirectory: "./data/ngrid"

# --- Admin API ---
# Habilita a API administrativa para deploy de rules e consulta de versão.
# Autenticação via header X-API-Key. Roda na porta de management (9190).
# admin:
#   enabled: true
#   apiKey: "my-secure-api-key"

# --- Circuit Breaker (Resilience4j) ---
# Protege backends contra falhas em cascata. Quando a taxa de falha ultrapassa
# o threshold, o circuito abre e requests são rejeitados imediatamente com HTTP 503.
# circuitBreaker:
#   enabled: true
#   failureRateThreshold: 50          # % de falhas para abrir o circuito
#   waitDurationInOpenState: 60       # segundos em estado OPEN antes de tentar HALF_OPEN
#   slidingWindowSize: 100            # número de calls na janela deslizante
#   permittedCallsInHalfOpenState: 10 # calls permitidos em HALF_OPEN para testar recovery
#   slowCallDurationThreshold: 5      # segundos — calls mais lentos são considerados "slow"
#   slowCallRateThreshold: 80         # % de slow calls para abrir o circuito

# --- Rate Limiting ---
# Controla a taxa de requests por listener, rota e/ou backend.
# Zonas nomeadas (como nginx limit_req_zone) podem ser referenciadas em qualquer escopo.
# Modos:
#   stall  - aguarda um slot livre até o timeout (equivalente a nginx delay)
#   nowait - rejeita imediatamente com HTTP 429
#
# rateLimiting:
#   enabled: true
#   defaultMode: "nowait"                # stall | nowait
#   zones:
#     api-global:
#       limitForPeriod: 100              # requests permitidos por período
#       limitRefreshPeriodSeconds: 1     # janela de refresh (1s = 100 req/s)
#       timeoutSeconds: 5               # max tempo de espera em modo stall
#     api-strict:
#       limitForPeriod: 10
#       limitRefreshPeriodSeconds: 1
#       timeoutSeconds: 2
#
# Uso por listener (dentro de listeners.<name>):
#   rateLimit:
#     zone: "api-global"
#     mode: "stall"                      # override do defaultMode
#
# Uso por rota (dentro de urlContexts.<name>):
#   rateLimit:
#     zone: "api-strict"
#     mode: "nowait"
#
# Uso por backend (dentro de backends.<name>):
#   rateLimit:
#     zone: "api-global"
#     mode: "nowait"

