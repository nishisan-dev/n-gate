server {
    listen 8080;
    server_name _;

    default_type application/json;

    location / {
        return 200 '{"status":"ok","source":"static-backend","timestamp":"$time_iso8601","uri":"$request_uri","method":"$request_method"}';
        add_header X-Backend-Type "static-benchmark";
        add_header Content-Type "application/json";
    }

    location /health {
        return 200 '{"status":"healthy"}';
    }
}
