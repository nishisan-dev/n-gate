server {
    listen 8080;

    location / {
        return 200 '{"status":"ok","backend":"mock"}';
        add_header Content-Type application/json;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Endpoint que retorna erro para provocar circuit breaker
    location /error {
        return 502 '{"status":"error","backend":"mock"}';
        add_header Content-Type application/json;
    }
}
