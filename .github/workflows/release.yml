name: Build, Package .deb & Publish Docker

on:
  release:
    types: [published]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Maven for GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-nishi-utils-spring</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-utils</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ishin-gateway-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ishin-gateway-ui

      - name: Build frontend (ishin-gateway-ui)
        run: npm run build
        working-directory: ishin-gateway-ui

      - name: Set project version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          mvn -B versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: mvn -B test -Dtest='!*IntegrationTest' -DfailIfNoTests=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Maven
        run: mvn -B -DskipTests package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .deb package
        run: |
          VERSION="${RELEASE_VERSION}"
          PKG="ishin-gateway_${VERSION}_all"

          # Montar árvore FHS
          mkdir -p "${PKG}/opt/ishin-gateway"
          mkdir -p "${PKG}/etc/ishin-gateway/rules/default"
          mkdir -p "${PKG}/etc/ishin-gateway/ssl"
          mkdir -p "${PKG}/var/log/ishin-gateway"
          mkdir -p "${PKG}/lib/systemd/system"
          mkdir -p "${PKG}/etc/logrotate.d"
          mkdir -p "${PKG}/DEBIAN"

          # Copiar artefatos
          cp target/ishin-gateway-*.jar "${PKG}/opt/ishin-gateway/ishin-gateway.jar"
          cp debian/adapter-production.yaml "${PKG}/etc/ishin-gateway/adapter.yaml"
          cp debian/rules/default/Rules.groovy "${PKG}/etc/ishin-gateway/rules/default/"
          cp src/main/resources/log4j2.xml "${PKG}/etc/ishin-gateway/"
          cp debian/ishin-gateway.service "${PKG}/lib/systemd/system/"
          cp debian/ishin-gateway.logrotate "${PKG}/etc/logrotate.d/ishin-gateway"

          # CLI tool
          mkdir -p "${PKG}/usr/bin"
          cp debian/ishin-cli "${PKG}/usr/bin/ishin-cli"
          chmod 755 "${PKG}/usr/bin/ishin-cli"

          # Control files
          sed "s/^Version:.*/Version: ${VERSION}/" debian/control > "${PKG}/DEBIAN/control"
          cp debian/conffiles "${PKG}/DEBIAN/"
          cp debian/postinst "${PKG}/DEBIAN/" && chmod 755 "${PKG}/DEBIAN/postinst"
          cp debian/prerm "${PKG}/DEBIAN/" && chmod 755 "${PKG}/DEBIAN/prerm"
          cp debian/postrm "${PKG}/DEBIAN/" && chmod 755 "${PKG}/DEBIAN/postrm"

          # Build .deb
          dpkg-deb --build "${PKG}"

          echo "DEB_FILE=${PKG}.deb" >> "$GITHUB_ENV"

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "${DEB_FILE}"

      - name: Upload JAR artifact for Docker job
        uses: actions/upload-artifact@v4
        with:
          name: ishin-gateway-jar
          path: target/ishin-gateway-*.jar
          retention-days: 1

  docker-publish:
    runs-on: ubuntu-latest
    needs: build-deb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ishin-gateway-jar
          path: docker-context

      - name: Set version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: Dockerfile.ci
          push: true
          tags: |
            lnishisan/ishin-gateway:${{ env.RELEASE_VERSION }}
            lnishisan/ishin-gateway:latest
