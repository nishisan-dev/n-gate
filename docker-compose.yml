services:
  static-backend:
    image: nginx:alpine
    volumes:
      - ./compose/static-backend/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./compose/keycloak/realm-inventory-dev.json:/opt/keycloak/data/import/realm-inventory-dev.json:ro
    ports:
      - "8081:8080"

  zipkin:
    image: openzipkin/zipkin:3.5
    ports:
      - "9411:9411"

  inventory-adapter:
    image: maven:3.9.9-eclipse-temurin-17
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    depends_on:
      - keycloak
      - zipkin
      - static-backend
    environment:
      SPRING_PROFILES_DEFAULT: dev
      INVENTORY_ADAPTER_CONFIG: /workspace/config/adapter.yaml
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MAVEN_CONFIG: /tmp/.m2
    volumes:
      - ./:/workspace
      - maven-cache:/tmp/.m2
    command:
      - /bin/bash
      - -lc
      - mvn -DskipTests package && java -Dspring.profiles.active=dev -jar target/inventory-adapter-1.0-SNAPSHOT.jar
    ports:
      - "9090:9090"
      - "9091:9091"
      - "18080:18080"

volumes:
  maven-cache:
